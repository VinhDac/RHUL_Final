<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="340" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">The core: the more you try, the more luck inflates your "best"</text>

<rect x="15" y="56" width="195" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="112" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Bag of N configs</text>
<text x="112" y="99" text-anchor="middle" font-size="12" fill="#5F5E5A">kNN, tree, logreg, SVM</text>

<line x1="210" y1="84" x2="232" y2="84" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="235" y="56" width="195" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="332" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Small val &#8594; keep best</text>
<text x="332" y="99" text-anchor="middle" font-size="12" fill="#185FA5">= apparent score</text>

<line x1="430" y1="84" x2="452" y2="84" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="455" y="56" width="195" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="552" y="80" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Huge sealed test</text>
<text x="552" y="99" text-anchor="middle" font-size="12" fill="#0F6E56">= true score</text>

<rect x="235" y="130" width="415" height="34" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="442" y="152" text-anchor="middle" font-size="14" font-weight="500" fill="#791F1F">gap = apparent &#8722; true   &#8594;   fooled by luck</text>

<text x="60" y="200" text-anchor="start" font-size="14" font-weight="500" fill="#2C2C2A">More configs tried (larger N) &#8594; the gap widens:</text>

<polyline points="90,280 600,280" fill="none" stroke="#0F6E56" stroke-width="2.5"/>
<polyline points="90,277 250,260 420,244 600,230" fill="none" stroke="#185FA5" stroke-width="2.5"/>

<line x1="612" y1="230" x2="612" y2="280" stroke="#A32D2D" stroke-width="1.5"/>
<text x="620" y="259" text-anchor="start" font-size="12" font-weight="500" fill="#A32D2D">gap</text>

<text x="300" y="248" text-anchor="middle" font-size="12" fill="#185FA5">apparent &#8593;</text>
<text x="300" y="296" text-anchor="middle" font-size="12" fill="#0F6E56">true &#8212; flat</text>

<line x1="80" y1="308" x2="628" y2="308" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="326" text-anchor="middle" font-size="12" fill="#5F5E5A">N &#8212; configurations tried</text>
</svg>
